    function cekKelulusan() {
        const inputNisn = document.getElementById('nisn').value.trim();
        const resultContainer = document.getElementById('result-container');
        const statusAlert = document.getElementById('status-alert');

        if (inputNisn === '') {
            alert("Silakan masukkan NISN Anda terlebih dahulu.");
            return;
        }

        // Cari data siswa berdasarkan NISN
        const siswa = dataSiswa.find(s => s.nisn === inputNisn);

        if (siswa) {
            // Tampilkan container
            resultContainer.style.display = 'block';

            // Isi tabel data
            document.getElementById('res-nama').innerText = siswa.nama;
            document.getElementById('res-ttl').innerText = `${siswa.tempat_lahir}, ${siswa.tanggal_lahir}`;
            document.getElementById('res-ortu').innerText = siswa.ortu;
            document.getElementById('res-no-induk').innerText = siswa.no_induk;
            document.getElementById('res-nisn').innerText = siswa.nisn;
            document.getElementById('res-nilai').innerText = siswa.nilai;

            // Logika kelulusan
            if (siswa.status.toLowerCase() === 'lulus') {
                statusAlert.className = 'alert alert-success';
                statusAlert.innerHTML = '🎉 Selamat, Anda LULUS!';
            } else {
                statusAlert.className = 'alert alert-danger';
                statusAlert.innerHTML = 'Maaf, Anda belum memenuhi kriteria kelulusan.<br><span class="motivation">"Tetap semangat dan jangan menyerah! Setiap kegagalan adalah pelajaran berharga untuk melangkah lebih kuat di masa depan. Teruslah berjuang dalam pendidikan Anda!"</span>';
            }
        } else {
            resultContainer.style.display = 'none';
            alert("Data tidak ditemukan. Pastikan NISN yang dimasukkan sudah benar.");
        }
    }

    // Memungkinkan user menekan "Enter" pada keyboard untuk submit
    document.getElementById("nisn").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            cekKelulusan();
        }
    });
</script>
